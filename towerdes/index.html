<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang="title">Thiết kế vị trí cột và anten</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
        padding: 1rem;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        gap: 2rem;
      }
      .control-panel,
      .map-container {
        background-color: #fff;
        padding: 1.5rem;
        border-radius: 1rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .language-switch {
        position: absolute;
        right: 20px;
        top: 20px;
      }
      select {
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid #ccc;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #4b5563;
      }
      input,
      select {
        width: 100%;
        padding: 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid #d1d5db;
      }
      .btn {
        width: 100%;
        padding: 1rem;
        background-color: #3b82f6;
        color: #fff;
        font-weight: 700;
        border-radius: 0.5rem;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.2s;
        border: none;
      }
      .btn:hover {
        background-color: #2563eb;
      }
      .btn:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
      }
      .btn.w-auto {
        width: auto;
        padding: 0.75rem 1rem;
        white-space: nowrap;
        font-size: 0.875rem;
      }
      .flex {
        display: flex;
      }
      .flex-1 {
        flex: 1;
      }
      .gap-2 {
        gap: 0.5rem;
      }
      #map {
        height: 100%;
        width: 100%;
        border-radius: 0.75rem;
      }
      .info-panel {
        background-color: #e5e7eb;
        padding: 1rem;
        border-radius: 0.5rem;
        margin-top: 1rem;
        text-align: center;
        font-size: 0.875rem;
        color: #1f2937;
      }

      .map-container {
        height: 60vh;
      }

      .tab-button {
        padding: 10px 15px;
        cursor: pointer;
        border: none;
        background-color: #e5e7eb;
        font-weight: 600;
        color: #4b5563;
      }
      .tab-button.active {
        background-color: #3b82f6;
        color: #fff;
        border-radius: 0.5rem 0.5rem 0 0;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* ===== LOGIN SCREEN ===== */
      #login-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #login-screen.hidden {
        display: none;
      }

      .login-box {
        background: #fff;
        border-radius: 1.25rem;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .login-logo {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .login-logo h1 {
        font-size: 1.4rem;
        font-weight: 800;
        color: #1e3a5f;
        margin-top: 0.5rem;
      }
      .login-logo p {
        font-size: 0.85rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }
      .login-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid #d1d5db;
        border-radius: 0.6rem;
        font-size: 1rem;
        margin-bottom: 1rem;
        box-sizing: border-box;
        transition: border-color 0.2s;
        outline: none;
      }
      .login-input:focus {
        border-color: #2563eb;
      }
      .login-btn {
        width: 100%;
        padding: 0.85rem;
        background: #2563eb;
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        border: none;
        border-radius: 0.6rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .login-btn:hover {
        background: #1d4ed8;
      }
      .login-btn:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }
      .login-error {
        background: #fee2e2;
        color: #b91c1c;
        border-radius: 0.5rem;
        padding: 0.6rem 1rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }
      .login-error.show {
        display: block;
      }
      .login-footer {
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #9ca3af;
      }
      /* Thanh trên cùng sau khi đăng nhập */
      #user-bar {
        display: none;
        background: #1e3a5f;
        color: #fff;
        padding: 0.5rem 1.5rem;
        font-size: 0.85rem;
        align-items: center;
        justify-content: space-between;
      }
      #user-bar.show {
        display: flex;
      }
      #logout-btn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: #fff;
        padding: 0.3rem 0.8rem;
        border-radius: 0.4rem;
        cursor: pointer;
        font-size: 0.8rem;
      }
      #logout-btn:hover {
        background: rgba(255, 255, 255, 0.25);
      }

      @media (min-width: 1024px) {
        .container {
          display: flex;
          flex-direction: row;
          min-height: 90vh;
        }
        .control-panel {
          flex: 1;
        }
        .map-container {
          flex: 3;
          height: auto;
        }
      }
    </style>
  </head>

  <body>
    <!-- ===== MÀN HÌNH ĐĂNG NHẬP ===== -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">
          <div style="font-size: 2.5rem">📡</div>
          <h1>Tower Design</h1>
          <p>Hệ thống thiết kế vị trí cột và anten</p>
        </div>

        <div id="login-error" class="login-error"></div>

        <input
          type="text"
          id="login-username"
          class="login-input"
          placeholder="Tên đăng nhập"
          autocomplete="username"
        />

        <input
          type="password"
          id="login-password"
          class="login-input"
          placeholder="Mật khẩu"
          autocomplete="current-password"
        />

        <button id="login-btn" class="login-btn" onclick="doLogin()">
          Đăng nhập
        </button>

        <div class="login-footer">Chỉ dành cho nội bộ</div>
      </div>
    </div>

    <!-- ===== THANH USER SAU KHI ĐĂNG NHẬP ===== -->
    <div id="user-bar">
      <span>👤 Xin chào, <strong id="user-name"></strong></span>
      <button id="logout-btn" onclick="doLogout()">Đăng xuất</button>
    </div>

    <!-- Bộ chọn ngôn ngữ -->
    <div class="language-switch">
      <select id="languageSelect" onchange="changeLanguage()">
        <option value="vi">🇻🇳 Tiếng Việt</option>
        <option value="en">🇬🇧 English</option>
        <option value="pt">🇵🇹 Português</option>
      </select>
    </div>

    <div class="container flex flex-col lg:flex-row">
      <div class="control-panel">
        <h1
          class="text-3xl font-bold text-center mb-6 text-gray-800"
          data-lang="header"
        >
          Thiết kế vị trí cột và anten
        </h1>

        <!-- Tabs -->
        <div class="flex border-b border-gray-300 mb-4">
          <button
            class="tab-button active rounded-t-lg"
            onclick="openTab('tab1')"
            data-lang="tab1"
          >
            Thiết kế móng cột
          </button>

          <button
            class="tab-button rounded-t-lg"
            onclick="openTab('tab2')"
            data-lang="tab2"
          >
            Thiết kế anten
          </button>
        </div>

        <!-- TAB 1 -->
        <div id="tab1" class="tab-content active">
          <div class="form-group">
            <label data-lang="lat">Tọa độ tâm cột (Vĩ độ):</label>
            <div class="flex gap-2">
              <input type="text" id="lat1" value="-25.744104" class="flex-1" />
              <button
                class="btn px-3 py-2 w-auto"
                onclick="getGPS('tab1')"
                title="Lấy GPS hiện tại"
              >
                📍 GPS
              </button>
            </div>
          </div>

          <div class="form-group">
            <label data-lang="lng">Tọa độ tâm cột (Kinh độ):</label>
            <div class="flex gap-2">
              <input type="text" id="lng1" value="32.671572" class="flex-1" />
              <button
                class="btn px-3 py-2 w-auto"
                id="mapSelectBtn1"
                onclick="toggleMapSelection('tab1')"
                title="Chọn trên bản đồ"
              >
                🗺️ Chọn
              </button>
            </div>
          </div>

          <div class="form-group">
            <label data-lang="towerType">Loại cột:</label>
            <select id="loaiCot" onchange="updateMongCoOptions()">
              <option value="day_co" data-lang="guyed">Dây co</option>
              <option value="tu_dung" data-lang="self">Tự đứng</option>
            </select>
          </div>

          <div class="form-group">
            <label data-lang="gateAzimuth">Hướng cửa trạm (góc Azimuth):</label>
            <input
              type="number"
              id="huongCuaTram"
              value="0"
              min="0"
              max="360"
            />
          </div>

          <div class="form-group">
            <label data-lang="fence">Kích thước hàng rào (rộng x dài):</label>
            <div class="flex gap-2">
              <input
                type="number"
                id="kichThuocHangRaoRong"
                value="6"
                min="1"
                step="0.1"
              />
              <input
                type="number"
                id="kichThuocHangRaoDai"
                value="8"
                min="1"
                step="0.1"
              />
            </div>
          </div>

          <div class="form-group">
            <label data-lang="anchors">Số móng co:</label>
            <select id="soMongCo">
              <option value="0">0</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
            </select>
            <small
              style="
                color: #999;
                font-size: 0.75rem;
                margin-top: 0.25rem;
                display: block;
              "
            >
              Dây co: 3, 4 | Tự đứng: 0
            </small>
          </div>

          <div class="form-group">
            <label data-lang="height">Độ cao cột (m):</label>
            <input type="number" id="doCaoCot" value="60.5" step="0.1" />
          </div>

          <button class="btn" onclick="veBanDoCot()" data-lang="drawMap1">
            Vẽ bản đồ
          </button>

          <div id="infoPanel1" class="info-panel"></div>
        </div>

        <!-- TAB 2 -->
        <div id="tab2" class="tab-content">
          <div class="form-group">
            <label data-lang="lat">Tọa độ tâm cột (Vĩ độ):</label>
            <div class="flex gap-2">
              <input type="text" id="lat2" value="-25.744104" class="flex-1" />
              <button
                class="btn px-3 py-2 w-auto"
                onclick="getGPS('tab2')"
                title="Lấy GPS hiện tại"
              >
                📍 GPS
              </button>
            </div>
          </div>

          <div class="form-group">
            <label data-lang="lng">Tọa độ tâm cột (Kinh độ):</label>
            <div class="flex gap-2">
              <input type="text" id="lng2" value="32.671572" class="flex-1" />
              <button
                class="btn px-3 py-2 w-auto"
                id="mapSelectBtn2"
                onclick="toggleMapSelection('tab2')"
                title="Chọn trên bản đồ"
              >
                🗺️ Chọn
              </button>
            </div>
          </div>

          <div class="form-group">
            <label data-lang="antenCount">Số lượng anten:</label>
            <input type="number" id="soAnten" value="3" min="1" />
          </div>

          <div id="anten-fields"></div>

          <button
            class="btn mt-4"
            onclick="addAntenFields()"
            data-lang="addAnten"
          >
            Thêm anten
          </button>

          <button
            class="btn mt-4"
            onclick="veBanDoAnten()"
            data-lang="drawMap2"
          >
            Vẽ bản đồ
          </button>

          <div id="infoPanel2" class="info-panel"></div>
        </div>
      </div>

      <div class="map-container">
        <div id="map"></div>
      </div>
    </div>

    <!-- Script -->
    <script src="config.js" type="text/javascript"></script>
    <script src="lang.js" type="text/javascript"></script>
    <script src="script.js" type="text/javascript"></script>

    <!-- ===== LOGIC ĐĂNG NHẬP ===== -->
    <script>
      // Kiểm tra session khi tải trang
      (function checkSession() {
        const saved = sessionStorage.getItem("tower_user");
        if (saved) {
          const user = JSON.parse(saved);
          showApp(user.name);
        }
      })();

      // Cho phép nhấn Enter để đăng nhập
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          const screen = document.getElementById("login-screen");
          if (!screen.classList.contains("hidden")) doLogin();
        }
      });

      async function doLogin() {
        const username = document.getElementById("login-username").value.trim();
        const password = document.getElementById("login-password").value.trim();
        const btn = document.getElementById("login-btn");
        const errorBox = document.getElementById("login-error");

        errorBox.classList.remove("show");

        if (!username || !password) {
          showError("Vui lòng nhập tên đăng nhập và mật khẩu.");
          return;
        }

        // Hiện trạng thái đang xử lý
        btn.disabled = true;
        btn.textContent = "Đang kiểm tra...";

        try {
          const res = await fetch(CONFIG.AUTH_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (data.success) {
            // Lưu session
            sessionStorage.setItem(
              "tower_user",
              JSON.stringify({ name: data.name }),
            );
            showApp(data.name);
          } else {
            showError(data.message || "Đăng nhập thất bại.");
          }
        } catch (err) {
          showError("Không thể kết nối máy chủ. Vui lòng thử lại.");
        }

        btn.disabled = false;
        btn.textContent = "Đăng nhập";
      }

      function showApp(name) {
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("user-bar").classList.add("show");
        document.getElementById("user-name").textContent = name;
      }

      function doLogout() {
        sessionStorage.removeItem("tower_user");
        document.getElementById("login-screen").classList.remove("hidden");
        document.getElementById("user-bar").classList.remove("show");
        document.getElementById("login-username").value = "";
        document.getElementById("login-password").value = "";
      }

      function showError(msg) {
        const box = document.getElementById("login-error");
        box.textContent = msg;
        box.classList.add("show");
      }
    </script>

    </script>
  </body>
</html>
